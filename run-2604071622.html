<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1">
  <title>CloudMoon - Play</title>
  <script src="https://s3.ap-southeast-1.amazonaws.com/cdn.cloudbatata.com/ajax/libs/vue/2.6.12/vue.min.js"></script>
  <script src="https://s3.ap-southeast-1.amazonaws.com/cdn.cloudbatata.com/ajax/libs/socket.io/2.4.0/socket.io.js"></script>
  <script src="https://s3.ap-southeast-1.amazonaws.com/cdn.cloudbatata.com/ajax/libs/axios/0.26.0/axios.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.2/dist/sweetalert2.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/adapterjs@0.15.5/publish/adapter.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/loglevel@1.9.2/dist/loglevel.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.2/dist/sweetalert2.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.26.2/themes/material-ui.css" rel="stylesheet">
  <style>
    html,
    body {
      margin: 0;
      background: #000000;
      height: 100%;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .container.has-a-div {
      padding: 0 180px 140px 180px;
      box-sizing: border-box
    }

    .container.hide-vertical {
      padding: 120px 0 120px 0 !important;
      box-sizing: border-box
    }

    * {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    .rotate {
      transform: rotate(90deg);
      transform-origin: 28.13% 50%;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: conic-gradient(rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.0), rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 1));
      mask-image: radial-gradient(circle, rgba(0, 0, 0, 0) 58%, rgba(0, 0, 0, 1) 59%);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    /* loading page */
    .loading {
      width: 100vw;
      height: 100vh;
      background: rgba(30, 40, 49, 1);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
    }

    .a-div-vertical {
      min-height: 600px;
      width: 300px;
      background: rgba(38, 37, 43, 1);
      position: fixed;
      z-index: 9996;
      top: 10px;
      overflow: hidden;
      display: flex;
      flex-flow: column;
      align-items: center;
    }

    .a-div-horizontal {
      left: 50%;
      transform: translateX(-50%);
      height: 120px;
      min-width: 720px;
      background: rgba(38, 37, 43, 1);
      position: fixed;
      z-index: 9996;
      overflow: hidden;
      display: flex;
      /*flex-flow: column;*/
      justify-content: center;
      align-items: center;
    }

    .a-div-placeholder {
      white-space: pre-line;
      word-break: break-word;
      width: 100%;
      position: absolute;
      transform: translateY(-50%);
      top: 50%;
      padding: 0 1rem;
      box-sizing: border-box;
      text-align: center;
      font-size: 1rem;
      z-index: -1;
      color: #929295;
    }

    .a-div-video {
      position: fixed;
      height: 168px;
      width: 300px;
      z-index: 9997;
      bottom: 10px;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(38, 37, 43, 1);
    }

    @-webkit-keyframes animation2 {
      0% {
        width: 0;
      }

      50% {
        width: 100%;
      }

      100% {
        width: 0
      }
    }

    @-moz-keyframes animation2 {
      0% {
        width: 0
      }

      50% {
        width: 100%;
      }

      100% {
        width: 0
      }
    }

    @-o-keyframes animation2 {
      0% {
        width: 0
      }

      50% {
        width: 100%;
      }

      100% {
        width: 0
      }
    }

    @keyframes animation2 {
      0% {
        width: 0
      }

      50% {
        width: 100%;
      }

      100% {
        width: 0
      }
    }

    @-webkit-keyframes animation1 {
      0% {
        height: 0
      }

      50% {
        height: 100%;
      }

      100% {
        height: 0
      }
    }

    @-moz-keyframes animation1 {
      0% {
        height: 0
      }

      50% {
        height: 100%;
      }

      100% {
        height: 0
      }
    }

    @-o-keyframes animation1 {
      0% {
        height: 0
      }

      50% {
        height: 100%;
      }

      100% {
        height: 0
      }
    }

    @keyframes animation1 {
      0% {
        height: 0
      }

      50% {
        height: 100%;
      }

      100% {
        height: 0
      }
    }

    .load {
      animation: animation1 2.5s;
      -moz-animation: animation1 2.5s;
      -webkit-animation: animation1 2.5s;
      -o-animation: animation1 2.5s;
      background: #40dbfa;
      /*background: #000;*/
      height: 0;
      width: 10%;
      top: 0;
      animation-iteration-count: infinite;
    }

    .load-h {
      animation: animation2 2.5s;
      -moz-animation: animation2 2.5s;
      -webkit-animation: animation2 2.5s;
      -o-animation: animation2 2.5s;
      background: #40dbfa;
      /*background: #000;*/
      height: 10%;
      width: 0;
      animation-iteration-count: infinite;
    }

    .nenly {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 10000006;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #h2 {
      font-size: 50px;
      color: rgb(64, 219, 250);
      transition: color 1s;
    }

    @-webkit-keyframes opacity_none {
      0% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        display: none;
      }
    }

    @-moz-keyframes opacity_none {
      0% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        display: none;
      }
    }

    @-o-keyframes opacity_none {
      0% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        display: none;
      }
    }

    @keyframes opacity_none {
      0% {
        opacity: 1;
      }

      100% {
        opacity: 0;
        display: none;
      }
    }

    .yellow {
      color: #ffeb00 !important;
    }

    .red {
      color: #fc4a5e !important;
    }

    .green {
      color: #6cff00 !important;
    }

    #remote-video {
      width: 100%;
      height: 100%;
      object-fit: fill;
    }

    .video {
      -webkit-filter: contrast(1.06) saturate(1.06);
      -moz-filter: contrast(1.06) saturate(1.06);
      -o-filter: contrast(1.06) saturate(1.06);
      -ms-filter: "contrast(1.06) saturate(1.06)";
      filter: contrast(1.06) saturate(1.06);
    }

    .startGame {
      display: none;
    }

    #canvasCoc {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      z-index: 899;
    }

    .game {
      position: relative;
      height: 100%;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .btn-info {
      display: inline-block;
      font-weight: 800;
      text-align: center;
      vertical-align: middle;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      width: 275px;
      height: 75px;
      /*transition: color .15s ease-in-out, background-color .15s ease-in-out, border-color .15s ease-in-out, box-shadow .15s ease-in-out;*/
      color: #000;
      background: url("./run-site/images/enter_game_btn_1.png") no-repeat;
      background-position: center center;
      background-size: cover;
      /*border-color: #17a2b8;*/
      /*padding: .5rem 1rem;*/
      line-height: 80px;
      border: 0 solid #fff;
      font-size: 1.25rem;
      /*border-radius: .3rem;*/
    }

    .btn-info:active {
      background: url("./run-site/images/enter_game_btn_2.png") no-repeat;
      background-position: center center;
      background-size: cover;
    }

    .input-div {
      height: 3rem;
      position: fixed;
      width: 600px;
      right: 0;
      left: 0;
      margin: auto;
      pointer-events: auto;
      z-index: 99998;
      /*overflow: hidden;*/
    }

    .input-div:focus-within::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      width: calc(100% + 4px);
      height: calc(100% + 4px);
      border-radius: 1.5rem;
      background: linear-gradient(90deg, #7B6CC4, #ffffff, #7B6CC4);
      background-size: 200% 100%;
      animation: borderMarquee 1.5s linear 1.5s;
      pointer-events: none;
      z-index: 1;
      opacity: 0.5;
    }

    @keyframes borderMarquee {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    .input-div_input {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;
      border-radius: 1.5rem;
      padding: 0 6rem 0 1.5rem;
      font-size: 1.4rem;
      box-sizing: border-box;
      position: relative;
      background: #fff;
      z-index: 2;
      opacity: 0.7;
    }

    .input-div_div {
      position: absolute;
      width: 6rem;
      right: 0;
      bottom: 0;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 3;
    }

    .input-div_div_button {
      background-color: #7B6CC4;
      width: 4rem;
      height: 1.8rem;
      border: 0;
      border-radius: 0.9rem;
      opacity: 1;
      cursor: pointer;
    }

    .swal2-container {
      z-index: 99999;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .swal2-actions {
      justify-content: center !important;
    }

    body.swal2-height-auto {
      height: 100% !important;
    }

    .game-pad {
      text-align: center;
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      z-index: 99999;
      /*background-color: #fff;*/
    }

    .game-pad-rocker {
      text-align: center;
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      z-index: 100000;
      pointer-events: none;
    }

    .game-pad_large_btn {
      position: absolute;
      width: 6rem;
      height: 2.5rem;
      line-height: 2.5rem;
      background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0) 30%, #828B9E 100%);
      border-radius: 5px;
      border: 1px solid #828B9E;
      color: #828B9E;
      opacity: 0.8;
    }

    .game-pad_large_btn:active {
      background: rgba(255, 255, 255, 0.1);
    }

    .game-pad_menu_btn {
      position: absolute;
      width: 2.5rem;
      height: 2.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0) 30%, #828B9E 100%);
      border-radius: 50%;
      border: 1px solid #828B9E;
      opacity: 0.8;
    }

    .game-pad_menu_btn:active {
      background: rgba(255, 255, 255, 0.1);
    }

    .game-pad_arrow_btn {
      position: absolute;
      border-radius: 2px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0) 30%, #828B9E 100%);
      border: 1px solid #828B9E;
      opacity: 0.8;
    }

    .game-pad_arrow_btn:active {
      background: rgba(255, 255, 255, 0.1);
    }

    .game-pad_play_btn {
      color: #828B9E;
      position: absolute;
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0) 30%, #828B9E 100%);
      border-radius: 50%;
      width: 3rem;
      height: 3rem;
      line-height: 3rem;
      border: 1px solid #828B9E;
      opacity: 0.8;
    }

    .game-pad_play_btn:active {
      background: rgba(255, 255, 255, 0.1);
    }

    .keyboard {
      position: fixed;
      z-index: 1000;
      pointer-events: none;
      background-color: transparent;
      margin: auto;
    }

    .keyboard-key {
      position: absolute;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      cursor: pointer;
      user-select: none;
      pointer-events: auto;
      text-align: center;
      opacity: 0.3;
      /* 默认半透明，减少画面遮挡 */
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
    }

    /* 按下状态：瞬间高亮并带有紫色霓虹发光 */
    .keyboard-key:active,
    .keyboard-key-press {
      opacity: 0.9 !important;
      transform: scale(0.92);
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.8);
      border-color: rgba(139, 92, 246, 0.5) !important;
    }

    .keyboard-key-text.editing {
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
      animation: pulse-glow 2s infinite ease-in-out;
    }

    @keyframes pulse-glow {
      0% {
        opacity: 0.6;
      }

      50% {
        opacity: 1;
      }

      100% {
        opacity: 0.6;
      }
    }

    .keyboard-no-pointer {
      pointer-events: none;
    }

    .keyboard-key {
      position: absolute;
      backdrop-filter: blur(2px);
      font-size: 0.6rem;
      color: #ffffff;
      user-select: none;
      touch-action: none;
      transition: transform 0.08s, box-shadow 0.08s;
    }

    .keyboard-key-remove {
      position: absolute;
      height: 16px;
      width: 16px;
      color: #fff;
      top: -16px;
      right: -16px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      cursor: pointer;
    }

    .keyboard-key-text {
      cursor: grab;
      background: linear-gradient(to top, rgba(92, 109, 130, 0.7), rgba(60, 70, 81, 0.7));
      border-radius: 50%;
    }

    .keyboard-key-text.dragging {
      cursor: grabbing;
      background: rgba(255, 255, 255, 0.9);
      color: #232830;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
      z-index: 9999;
    }

    .keyboard-key-small {
      transform: translate(-50%, 50%);
      border-radius: 50%;
      height: 1.6rem;
      width: 1.6rem;
      line-height: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .keyboard-key-large {
      border-radius: 1rem;
      height: 2rem;
      width: 4rem;
      line-height: 2rem;
    }

    .keyboard-key-press {
      background-color: rgba(255, 255, 255, 0.2) !important;
    }

    .keyboard-lock {
      opacity: 0.6;
      text-align: center;
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      border-radius: 1.1rem;
      height: 2.2rem;
      line-height: 2.2rem;
      /*width: 14rem;*/
      background-color: rgba(0, 0, 0, 0.4);
      padding: 0 1.1rem;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #fff;
      border: 1px #fff solid;
    }

    .keyboard-editor {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      padding: 0 1.1rem;
      display: flex;
      gap: 2rem;
    }

    .bling {
      animation: blink-scale 2s forwards;
    }

    @keyframes blink-scale {
      0% {
        background-color: #5c6ac4;
        transform: scale(1);
      }

      25% {
        background-color: #8fa0ff;
        transform: scale(1.5);
      }

      50% {
        background-color: #5c6ac4;
        transform: scale(1);
      }

      75% {
        background-color: #8fa0ff;
        transform: scale(1.5);
      }

      100% {
        background-color: #5c6ac4;
        transform: scale(1);
      }
    }

    @keyframes shine {
      0% {
        left: -100%;
      }

      50% {
        left: 100%;
      }

      100% {
        left: 100%;
      }
    }

    @keyframes blink {

      0%,
      100% {
        background-color: #fffa65;
      }

      50% {
        background-color: #ff6a6a;
      }
    }

    .editor-btn {
      height: 2.2rem;
      line-height: 2.2rem;
      width: 6.5rem;
      border-radius: 1.1rem;
      cursor: pointer;
      color: #fff;
      font-size: 1rem;
      text-align: center;
      display: inline-block;
      transition: all 0.2s ease;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
      /* 轻微浮起感 */
    }

    .layout-btn select {
      width: 100%;
      height: 100%;
      padding-left: 10px;
      border: none;
      outline: none;
      font-size: 1rem;
      background: #5a6c78;
      color: #fff;
    }

    .layout-btn select option {
      color: #fff;
      background: linear-gradient(145deg, #6d8391, #5a6c78);
    }

    /* Reset 按钮 */
    .reset-btn {
      background: linear-gradient(145deg, #5a6c78, #3f4f5b);
    }

    .reset-btn:hover {
      background: linear-gradient(145deg, #6b7d8b, #495864);
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
    }

    /* Add Key 按钮 */
    .add-key-btn {
      background: linear-gradient(145deg, #47537a, #5c6ac4);
    }

    .add-key-btn:hover {
      background: linear-gradient(145deg, #5a67a4, #6a78d1);
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
    }

    /* Done 按钮 */
    .done-btn {
      background: linear-gradient(145deg, #5c6ac4, #8fa0ff);
    }

    .done-btn:hover {
      background: linear-gradient(145deg, #6a78d1, #9fb0ff);
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
    }

    .loader {
      position: relative;
      width: 100px;
      height: 100px;
      margin-bottom: 20px;
    }

    /* 渐变圆形（logo 圆） */
    .circle {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: linear-gradient(225deg,
          #ffcd85 0%,
          #ffb07c 25%,
          #ff8fa3 40%,
          #8e44ad 100%);
      /*-webkit-mask: radial-gradient(farthest-side, black 90%, transparent 100%);*/
      /*-webkit-mask-composite: destination-in;*/
      mask-composite: intersect;
      position: relative;
      z-index: 1;
    }

    /* 云朵 */
    .cloud {
      z-index: 2;
      position: absolute;
      background: #fff;
      animation: float 3s ease-in-out infinite alternate;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 1);
    }

    .cloud::before,
    .cloud::after {
      content: '';
      position: absolute;
      background: #fff;
      border-radius: 50%;
    }

    .cloud1 {
      width: 70px;
      height: 30px;
      top: 60px;
      left: -25px;

      border-radius: 15px;
    }

    .cloud1::before {
      width: 40px;
      height: 40px;
      top: -18px;
      left: 10px;
    }

    .cloud1::after {
      width: 25px;
      height: 25px;
      top: 14px;
      left: 13px;
    }

    .cloud2 {
      width: 40px;
      height: 20px;
      top: 60px;
      left: 80px;
      animation-duration: 2s;
      border-radius: 10px;
    }

    .cloud2::before {
      width: 25px;
      height: 25px;
      top: -10px;
      left: 8px;
    }

    @keyframes float {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-15px);
      }

      100% {
        transform: translateY(0px);
      }
    }

    .l-rocker {
      transform: translate(-50%, 50%);
      position: absolute;
      cursor: grab;
      width: 150px;
      height: 150px;
      background-color: rgba(0, 0, 0, 0.1);
      border-radius: 50%;
    }

    .l-rocker.dragging {
      cursor: grabbing;
      background: rgba(255, 255, 255, 0.1);
      color: #232830;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
      z-index: 9999;
    }

    .l-rocker-key {
      position: absolute;
    }

    .l-rocker-key div {}

    .l-rocker-key-small {
      border-radius: 50%;
      height: 1.6rem;
      width: 1.6rem;
      line-height: 1.6rem;
      transform: translate(-50%, 50%);
      background-color: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(2px);
      color: #ffffff;
      font-size: 0.6rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .ping {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 16px;

  <div id="app" ref="containerDiv" class="container" v-cloak>

    <div id="menu" class="menu" :style="{'pointer-events': openMenu? 'auto' : 'none'}">

        <div class="sidebar-button">
          <div style="margin:auto 0;">Streaming Quality</div>

            <select style="background:#42505b;color: #fff;height: 2rem;width: 4rem;border-radius: 4px;border: none;" v-model="quality" @change="changeQuality(quality)">

          <div class="sidebar-button-btn" @click="isRotateScreen=!isRotateScreen">↻</div>
        </div>
        <div style="width: 100%;border: 1px #3f4c57 solid;margin-left: 1rem"></div>
        <div class="sidebar-button">

          <div class="sidebar-button-btn" @click="rotateScreenDC()">↻</div>

      <template v-if="currentGameConfig">
        <template v-for="(item, key) in currentGameConfig.keyBoard">
          <div v-show="(!cursorLock && !item.pointerLockShow) || (cursorLock && item.pointerLockShow) || (!item.pointerLockShow && !item.pointerLockHidden)" :key="key" :class="['keyboard-key',`keyboard-key-${item.size}`,`keyboard-key-${keyToKeyCode(item.key)}`]" :style="keyStyle(item, currentGameConfig.keyBoardDirection)">

            </div>
          </div>
        </template>

      <div v-if="!isEditKeyboard && currentGameConfig && currentGameConfig.pointerLock" class="keyboard-lock" :style="{ opacity: cursorLock ? 0.2 : 0.7 }">

    </div>
