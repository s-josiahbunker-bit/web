<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CloudMoon - Minimal Cloud Gaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg-main: #1e2831; --primary: #8b5cf6; }
        html { scrollbar-gutter: stable; }
        body { background-color: var(--bg-main); color: white; user-select: none; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #565a68; border-radius: 3px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .loading-spinner { animation: spin 1s linear infinite; }
        @keyframes shimmer { 0% { background-position: -468px 0; } 100% { background-position: 468px 0; } }
        .skeleton { background: linear-gradient(to right, #2d3748 8%, #3a4454 18%, #2d3748 33%); background-size: 800px 104px; animation: shimmer 1.5s linear infinite forwards; }
        .category-btn { background-color: #2d3748; color: #a0aec0; }
        .category-btn.active { background-color: #8b5cf6; color: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 长列表性能优化：仅渲染视口附近的卡片 */
        .game-card-item {
            content-visibility: auto;
            contain-intrinsic-size: 150px 200px; /* 预估一张卡片在不同设备下的平均宽高 */
        }
        /* Modal & Queue Styles */
        #game-modal, #login-modal, #queue-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; }
        #login-modal { z-index: 200; }
        #queue-modal { z-index: 300; }
        .modal-overlay { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            /* 使用径向渐变替代模糊，中心略亮，营造聚光灯效果 */
            background: radial-gradient(circle at center, rgba(45, 55, 72, 0.85) 0%, rgba(0, 0, 0, 0.92) 100%);
        }
        .modal-container, .login-container, .queue-container { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background-color: #1e2831; 
            border-top-left-radius: 24px; 
            border-top-right-radius: 24px; 
            max-height: 90vh; 
            overflow-y: auto; 
            transform: translateY(100%); 
            transition: transform 0.25s ease-out; 
            border: 1px solid rgba(139, 92, 246, 0.2); /* 淡淡的紫色描边增强高亮感 */
        }
        .login-container, .queue-container { top: 50%; left: 50%; bottom: auto; transform: translate(-50%, -45%); width: 90%; max-width: 400px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); opacity: 0; transition: opacity 0.2s ease-out, transform 0.2s ease-out; }
        #game-modal.active .modal-container { transform: translateY(0); }
        #login-modal.active .login-container, #queue-modal.active .queue-container { transform: translate(-50%, -50%); opacity: 1; }
        @media (min-width: 768px) {
            .modal-container { width: 500px; height: fit-content; bottom: auto; top: 50%; left: 50%; transform: translate(-50%, -48%); border-radius: 24px; opacity: 0; transition: opacity 0.15s ease-out, transform 0.15s ease-out; }
            #game-modal.active .modal-container { transform: translate(-50%, -50%); opacity: 1; }
        }
        .login-input { background-color: #2d3748; border: 1px solid rgba(255, 255, 255, 0.1); color: white; width: 100%; padding: 12px 20px; border-radius: 16px; outline: none; transition: border-color 0.2s; }
        .login-input:focus { border-color: #8b5cf6; }
    </style>
</head>
<body class="font-sans">
    <nav class="sticky top-0 z-50 bg-[#1e2831] border-b border-gray-700 px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <img src="https://cloudmoonapp.com/favicon.ico" class="w-8 h-8 rounded-lg" alt="Logo">
            <span class="text-xl font-bold tracking-tight">CloudMoon</span>
        </div>
        <div class="flex items-center gap-4 w-full max-w-xs md:max-w-md mx-4">
            <div class="relative w-full">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                <input type="text" id="search-input" placeholder="Search games..." class="w-full bg-gray-800 border-none rounded-full pl-10 pr-4 py-1.5 text-sm focus:ring-2 focus:ring-[#8b5cf6] transition outline-none" oninput="handleSearch(this.value)">
            </div>
        </div>
        <div id="user-area" class="flex items-center gap-2"></div>
    </nav>

    <div id="category-bar" class="max-w-7xl mx-auto px-4 py-2 flex gap-2 overflow-x-auto no-scrollbar scroll-smooth"></div>

    <main class="max-w-7xl mx-auto p-4 pb-20">
        <div id="game-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
    </main>

    <div id="game-modal" class="flex flex-col">
        <div class="modal-overlay" onclick="closeModal()"></div>
        <div class="modal-container p-6"><div id="modal-content" class="flex flex-col gap-6"></div></div>
    </div>

    <div id="login-modal" class="flex flex-col">
        
    </div>

    
    <div id="queue-modal" class="flex flex-col">
        <div class="modal-overlay"></div>
        <div class="queue-container p-8 text-center">
            <div class="loading-spinner w-12 h-12 border-4 border-[#8b5cf6] border-t-transparent rounded-full mx-auto mb-6"></div>
            <h2 class="text-2xl font-bold text-white mb-2">In Queue</h2>
            <p class="text-gray-400 mb-8">Waiting for an available cloud device...</p>
            
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-gray-800/50 rounded-2xl p-4">
                    <span class="block text-xs text-gray-500 uppercase font-bold mb-1">Position</span>
                    <span id="queue-pos" class="text-2xl font-bold text-white">--</span>
                </div>
                <div class="bg-gray-800/50 rounded-2xl p-4">
                    <span class="block text-xs text-gray-500 uppercase font-bold mb-1">Est. Time</span>
                    <span id="queue-time" class="text-2xl font-bold text-white">--</span>
                </div>
            </div>

            <button onclick="cancelQueue()" class="w-full bg-gray-800 hover:bg-gray-700 text-white font-bold py-4 rounded-2xl transition">
                Cancel Waiting
            </button>
        </div>
    </div>
