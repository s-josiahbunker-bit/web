    html,

      margin: 0;
      background: #000000;
      height: 100%;

    .container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .container.has-a-div {
      padding: 0 180px 140px 180px;
      box-sizing: border-box
    }

    .container.hide-vertical {
      padding: 120px 0 120px 0 !important;

    * {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -khtml-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    .rotate {
      transform: rotate(90deg);
      transform-origin: 28.13% 50%;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: conic-gradient(rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.0), rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 1));
      mask-image: radial-gradient(circle, rgba(0, 0, 0, 0) 58%, rgba(0, 0, 0, 1) 59%);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .input-div {
    height: 3rem;
    position: fixed;
    width: 600px;
    right: 0;
    left: 0;
    margin: auto;
    pointer-events: auto;
    z-index: 99998;
    /*overflow: hidden;*/
}


.input-div:focus-within::before {
    content: '';
    position: absolute;
    top: -2px;
    left: -2px;
    width: calc(100% + 4px);
    height: calc(100% + 4px);
    border-radius: 1.5rem;
    background: linear-gradient(90deg, #7B6CC4, #ffffff, #7B6CC4);
    background-size: 200% 100%;
    animation: borderMarquee 1.5s linear 1.5s;
    pointer-events: none;
    z-index: 1;
    opacity: 0.5;
}

@keyframes borderMarquee {
    0% {
        background-position: 200% 0;
    }
    100% {
        background-position: -200% 0;
    }
}

.input-div_input {
    display: block;
    width: 100%;
    height: 100%;
    outline: none;
    border-radius: 1.5rem;
    padding: 0 6rem 0 1.5rem;
    font-size: 1.4rem;
    box-sizing: border-box;
    position: relative;
    background: #fff;
    z-index: 2;
    opacity: 0.7;
}

.input-div_div {
    position: absolute;
    width: 6rem;
    right: 0;
    bottom: 0;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 3;
}

.input-div_div_button {
    background-color: #7B6CC4;
    width: 4rem;
    height: 1.8rem;
    border: 0;
    border-radius: 0.9rem;
    opacity: 1;
    cursor: pointer;
}

    .keyboard {
      position: fixed;
      z-index: 1000;
      pointer-events: none;
      background-color: transparent;
      margin: auto;
    }

    .keyboard-key {
      position: absolute;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      cursor: pointer;
      user-select: none;
      pointer-events: auto;
      text-align: center;
      opacity: 0.3;
      /* 默认半透明，减少画面遮挡 */
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
    }

    /* 按下状态：瞬间高亮并带有紫色霓虹发光 */
    .keyboard-key:active,
    .keyboard-key-press {
      opacity: 0.9 !important;
      transform: scale(0.92);
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.8);
      border-color: rgba(139, 92, 246, 0.5) !important;
    }

    .keyboard-key-text.editing {
      text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
      animation: pulse-glow 2s infinite ease-in-out;
    }

    @keyframes pulse-glow {
      0% {
        opacity: 0.6;
      }

      50% {
        opacity: 1;
      }

      100% {
        opacity: 0.6;
      }
    }

    .keyboard-no-pointer {
      pointer-events: none;
    }

    .keyboard-key {
      position: absolute;
      backdrop-filter: blur(2px);
      font-size: 0.6rem;
      color: #ffffff;
      user-select: none;
      touch-action: none;
      transition: transform 0.08s, box-shadow 0.08s;
    }

    .keyboard-key-remove {
      position: absolute;
      height: 16px;
      width: 16px;
      color: #fff;
      top: -16px;
      right: -16px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      cursor: pointer;
    }

    .keyboard-key-text {
      cursor: grab;
      background: linear-gradient(to top, rgba(92, 109, 130, 0.7), rgba(60, 70, 81, 0.7));
      border-radius: 50%;
    }

    .keyboard-key-text.dragging {
      cursor: grabbing;
      background: rgba(255, 255, 255, 0.9);
      color: #232830;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
      z-index: 9999;
    }

    .keyboard-key-small {

      align-items: center;
      justify-content: center;
    }

    .keyboard-key-large {

    }

    .keyboard-key-press {

    }

    @keyframes blink-scale {

      }

      25% {
        background-color: #8fa0ff;

      }

      75% {

      }

    /* 渐变圆形（logo 圆） */
    .circle {

          #ffb07c 25%,

      /*-webkit-mask-composite: destination-in;*/
      mask-composite: intersect;
      position: relative;

    /* 云朵 */
    .cloud {
      z-index: 2;
      position: absolute;
      background: #fff;
      animation: float 3s ease-in-out infinite alternate;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 1);
    }

    .cloud::before,
    .cloud::after {
      content: '';
      position: absolute;
      background: #fff;
      border-radius: 50%;
    }

    .cloud1 {
      width: 70px;
      height: 30px;
      top: 60px;
      left: -25px;

      height: 40px;
      top: -18px;
      left: 10px;
    }

    .cloud1::after {
