    <style>html, body {
    margin: 0;
    background: #000000;
    height: 100%;
}

.container {
    position: relative;
    width: 100%;
    height: 100%;
}

.container.has-a-div {
    padding: 0 180px 140px 180px;
    box-sizing: border-box
}

.container.hide-vertical {
    padding: 120px 0 120px 0 !important;
    box-sizing: border-box
}

* {
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    -khtml-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
}

.rotate {
    transform: rotate(90deg);
    transform-origin: 28.1% 50%;
}

.spinner {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: conic-gradient(rgba(255, 255, 255, 0), rgba(255, 255, 255, 0.0), rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 1));
    mask-image: radial-gradient(circle, rgba(0, 0, 0, 0) 58%, rgba(0, 0, 0, 1) 59%);
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% {
        transform: rotate(0deg);
    }
    100% {
        transform: rotate(360deg);
    }
}

/* loading page */

#remote-video {

}

.video {

.startGame {
    display: none;
}

#canvasCoc {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 899;
}

.game {
    position: relative;
    height: 100%;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
}

.btn-info {
    display: inline-block;
    font-weight: 800;
    text-align: center;
    vertical-align: middle;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
    width: 275px;
    height: 75px;
    /*transition: color .15s ease-in-out, background-color .15s ease-in-out, border-color .15s ease-in-out, box-shadow .15s ease-in-out;*/
    color: #000;
    background: url("./run-site/images/enter_game_btn_1.png") no-repeat;
    background-position: center center;
    background-size: cover;
    /*border-color: #17a2b8;*/
    /*padding: .5rem 1rem;*/
    line-height: 80px;
    border: 0 solid #fff;
    font-size: 1.25rem;
    /*border-radius: .3rem;*/
}

.btn-info:active {
    background: url("./run-site/images/enter_game_btn_2.png") no-repeat;
    background-position: center center;
    background-size: cover;
}

.input-div {
    height: 3rem;
    position: fixed;
    width: 600px;
    right: 0;
    left: 0;
    margin: auto;
    pointer-events: auto;
    z-index: 99998;
    /*overflow: hidden;*/
}


.input-div:focus-within::before {
    content: '';
    position: absolute;
    top: -2px;
    left: -2px;
    width: calc(100% + 4px);
    height: calc(100% + 4px);
    border-radius: 1.5rem;
    background: linear-gradient(90deg, #7B6CC4, #ffffff, #7B6CC4);
    background-size: 200% 100%;
    animation: borderMarquee 1.5s linear 1.5s;
    pointer-events: none;
    z-index: 1;
    opacity: 0.5;
}

@keyframes borderMarquee {
    0% {
        background-position: 200% 0;
    }
    100% {
        background-position: -200% 0;
    }
}

.input-div_input {
    display: block;
    width: 100%;
    height: 100%;
    outline: none;
    border-radius: 1.5rem;
    padding: 0 6rem 0 1.5rem;
    font-size: 1.4rem;
    box-sizing: border-box;
    position: relative;
    background: #fff;
    z-index: 2;
    opacity: 0.7;
}

.input-div_div {
    position: absolute;
    width: 6rem;
    right: 0;
    bottom: 0;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 3;
}

.input-div_div_button {
    background-color: #7B6CC4;
    width: 4rem;
    height: 1.8rem;
    border: 0;
    border-radius: 0.9rem;
    opacity: 1;
    cursor: pointer;
}

.swal2-container {
    z-index: 99999;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

.swal2-actions {
    justify-content: center !important;
}

.game-pad {
    text-align: center;
    position: fixed;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    z-index: 99999;
    /*background-color: #fff;*/
}

.game-pad-rocker {
    text-align: center;
    position: fixed;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    z-index: 100000;
    pointer-events: none;
}

.game-pad_large_btn {
    position: absolute;
    width: 6rem;
    height: 2.5rem;
    line-height: 2.5rem;
    background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0) 30%, #828B9E 100%);
    border-radius: 5px;
    border: 1px solid #828B9E;

}

.game-pad_large_btn:active {
    background: rgba(255, 255, 255, 0.1);
}

.game-pad_menu_btn {
    position: absolute;
    width: 2.5rem;
    height: 2.5rem;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0) 30%, #828B9E 100%);
    border-radius: 50%;

    opacity: 0.8;
}

.game-pad_menu_btn:active {
    background: rgba(255, 255, 255, 0.1);
}

.game-pad_arrow_btn {
    position: absolute;
    border-radius: 2px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(ellipse at center, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0) 30%, #828B9E 100%);

}

.game-pad_arrow_btn:active {

}

.game-pad_play_btn {
    color: #828B9E;
    position: absolute;
    background: radial-gradient(circle at center, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0) 30%, #828B9E 100%);
    border-radius: 50%;
    width: 3rem;
    height: 3rem;
    line-height: 3rem;
    border: 1px solid #828B9E;
    opacity: 0.8;
}

.game-pad_play_btn:active {
    background: rgba(255, 255, 255, 0.1);
}

.keyboard {
    text-align: center;
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 999;
    margin: auto;
}

.keyboard-no-pointer {
    pointer-events: none;
}

.keyboard-key {
    position: absolute;
    backdrop-filter: blur(2px);
    font-size: 0.6rem;
    color: #ffffff;
    user-select: none;
    touch-action: none;
    transition: transform 0.08s, box-shadow 0.08s;
}

.keyboard-key-remove {
    position: absolute;
    height: 16px;
    width: 16px;
    color: #fff;
    top: -16px;
    right: -16px;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 50%;
    cursor: pointer;
}

.keyboard-key-text {
    cursor: grab;
    background: linear-gradient(to top, rgba(92, 109, 130, 0.7), rgba(60, 70, 81, 0.7));
    border-radius: 50%;
}

.keyboard-key-text.dragging {
    cursor: grabbing;
    background: rgba(255, 255, 255, 0.9);
    color: #232830;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
    z-index: 9999;
}

.keyboard-key-small {
    transform: translate(-50%, 50%);
    border-radius: 50%;
    height: 1.6rem;
    width: 1.6rem;
    line-height: 1.6rem;
    display: flex;
    align-items: center;
    justify-content: center;
}

.keyboard-key-large {
    border-radius: 1rem;
    height: 2rem;
    width: 4rem;
    line-height: 2rem;
}

.keyboard-key-press {
    background-color: rgba(255, 255, 255, 0.2) !important;
}

.keyboard-lock {
    opacity: 0.6;
    text-align: center;
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    border-radius: 1.1rem;
    height: 2.2rem;
    line-height: 2.2rem;
    /*width: 14rem;*/
    background-color: rgba(0, 0, 0, 0.4);
    padding: 0 1.1rem;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: #fff;
    border: 1px #fff solid;
}

.keyboard-editor {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    padding: 0 1.1rem;
    display: flex;
    gap: 2rem;
}

.bling {
    animation: blink-scale 2s forwards;
}

@keyframes blink-scale {
    0% {
        background-color: #5c6ac4;
        transform: scale(1);
    }
    25% {
        background-color: #8fa0ff;
        transform: scale(1.5);
    }
    50% {
        background-color: #5c6ac4;
        transform: scale(1);
    }
    75% {
        background-color: #8fa0ff;
        transform: scale(1.5);
    }
    100% {
        background-color: #5c6ac4;
        transform: scale(1);
    }
}

@keyframes shine {
    0% {
        left: -100%;
    }
    50% {
        left: 100%;
    }
    100% {
        left: 100%;
    }
}

@keyframes blink {
    0%, 100% {
        background-color: #fffa65;
    }
    50% {
        background-color: #ff6a6a;
    }
}

.editor-btn {
    height: 2.2rem;
    line-height: 2.2rem;
    width: 6.5rem;
    border-radius: 1.1rem;
    cursor: pointer;
    color: #fff;
    font-size: 1rem;
    text-align: center;
    display: inline-block;
    transition: all 0.2s ease;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15); /* 轻微浮起感 */
}

.layout-btn select {
    width: 100%;
    height: 100%;
    padding-left: 10px;
    border: none;
    outline: none;
    font-size: 1rem;
    background: #5a6c78;
    color: #fff;
}

.layout-btn select option {
    color: #fff;
    background: linear-gradient(145deg, #6d8391, #5a6c78);
}

/* Reset 按钮 */
.reset-btn {
    background: linear-gradient(145deg, #5a6c78, #3f4f5b);
}

.reset-btn:hover {
    background: linear-gradient(145deg, #6b7d8b, #495864);
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
}

/* Add Key 按钮 */
.add-key-btn {
    background: linear-gradient(145deg, #47537a, #5c6ac4);
}

.add-key-btn:hover {
    background: linear-gradient(145deg, #5a67a4, #6a78d1);
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
}

/* Done 按钮 */
.done-btn {
    background: linear-gradient(145deg, #5c6ac4, #8fa0ff);
}

.done-btn:hover {
    background: linear-gradient(145deg, #6a78d1, #9fb0ff);
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
}

.loader {
    position: relative;
    width: 100px;
    height: 100px;
    margin-bottom: 20px;
}

/* 渐变圆形（logo 圆） */
.circle {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: linear-gradient(225deg,
    #ffcd85 0%,
    #ffb07c 25%,
    #ff8fa3 40%,
    #8e44ad 100%);
    /*-webkit-mask: radial-gradient(farthest-side, black 90%, transparent 100%);*/
    /*-webkit-mask-composite: destination-in;*/
    mask-composite: intersect;
    position: relative;
    z-index: 1;
}

/* 云朵 */
.cloud {
    z-index: 2;
    position: absolute;
    background: #fff;
    animation: float 3s ease-in-out infinite alternate;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 1);
}

.cloud::before,
.cloud::after {
    content: '';
    position: absolute;
    background: #fff;
    border-radius: 50%;
}

.cloud1 {
    width: 70px;
    height: 30px;
    top: 60px;
    left: -25px;

    border-radius: 15px;
}

.cloud1::before {
    width: 40px;
    height: 40px;
    top: -18px;
    left: 10px;
}

.cloud1::after {
    width: 25px;
    height: 25px;
    top: 14px;
    left: 13px;
}

.cloud2 {
    width: 40px;
    height: 20px;
    top: 60px;
    left: 80px;
    animation-duration: 2s;
    border-radius: 10px;
}

.cloud2::before {
    width: 25px;
    height: 25px;
    top: -10px;
    left: 8px;
}

@keyframes float {
    0% {
        transform: translateY(0px);
    }
    50% {
        transform: translateY(-15px);
    }
    100% {
        transform: translateY(0px);
    }
}

.l-rocker {
    transform: translate(-50%, 50%);
    position: absolute;
    cursor: grab;
    width: 150px;
    height: 150px;
    background-color: rgba(0, 0, 0, 0.1);
    border-radius: 50%;
}

.l-rocker.dragging {
    cursor: grabbing;
    background: rgba(255, 255, 255, 0.1);
    color: #232830;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);

}

.l-rocker-key {
    position: absolute;
    /*background-color: rgba(0, 0, 0, 0.3);*/
    background: linear-gradient(to top, rgba(92, 109, 130, 0.7), rgba(60, 70, 81, 0.7));

.menu {
    width: 100%;
    height: 100%;
    position: fixed;
    left: 0;
    top: 0;
    z-index: 9998;
}

.sidebar-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

.sidebar {
    overflow: hidden;
    height: 100%;
    width: 300px;
    background-color: #232830;
    position: absolute;
    left: -300px;
    top: 0;
    z-index: 4;
    transition: transform 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    justify-content: center;
}

.sidebar-open {
    transform: translateX(100%);
    transition: all 0.2s ease;
}

.sidebar-button {
    display: flex;
    justify-content: space-between;
    align-content: center;
    height: 3.5rem;
    box-sizing: border-box;
    text-align: left;
    width: 100%;
    padding: 0 1rem;
    border: none;
    background: none;
    color: #a1a1aa;
    font-size: 1rem;
}

.sidebar-div {
    display: flex;
    justify-content: space-between;
    align-content: center;
    box-sizing: border-box;
    text-align: left;
    width: 100%;
    padding: 0 1rem;
    border: none;
    background: none;
    color: #a1a1aa;
    font-size: 1rem;
    height: 25px;
    line-height: 25px;
}

.sidebar-div input {
    width: 50px;
    background-color: #3f4c57;
    color: white;
    border: none;
    box-shadow: none;
    outline: none;
    padding: 4px 6px;
    border-radius: 4px;
    margin-right: 10px;
}

.sidebar-button-btn {
    margin: auto 0;
    background-color: #3b4463;
    border: 1px #818cf8 solid;
    width: 4rem;
    text-align: center;
    height: 2rem;
    line-height: 2rem;
    border-radius: 1rem;
    color: #fff;
    cursor: pointer;
}

.switch {
    margin: auto 0;
    position: relative;
    display: inline-block;
    width: 50px;
    height: 24px;
}

.switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

.slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #42505b;
    transition: 0.3s;
    border-radius: 24px;
}

.slider::before {
    position: absolute;
    content: "";
    height: 18px;
    width: 18px;
    left: 3px;
    bottom: 3px;
    background-color: #717274;
    transition: 0.3s;
    border-radius: 50%;
}

input:checked + .slider {
    background-color: #818cf8;
}

input:checked + .slider::before {
    background-color: white;
    transform: translateX(26px);
}

.reward-btn {
    z-index: 9999;
    font-size: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
    opacity: 1;
    border-radius: 17px;
    background: rgba(59, 69, 99, 1);
    padding: 9px 15px;
    border: none;
    cursor: pointer;
}

.loading-video-div{
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

.loading-video-body{
    width: 100%;
    height: auto;

    aspect-ratio: 16 / 9;
    max-width: 100%;
    max-height: 100%;
}

.loading-progress {
    position: absolute;
    left: 50%;
    bottom: 2rem;
    transform: translateX(-50%);
    width: 80%;
    height: 3rem;
    overflow: hidden;
    border-radius: 1.5rem;
    background-color: rgba(57, 74, 89, 1);
    box-sizing: border-box;
}

.progress-mask {
    position: absolute;
    inset: 3px;
    border-radius: 1.5rem;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    border-radius: 1.5rem;
    background: rgba(147, 129, 235, 1);
    transform-origin: left center;
    transition: transform 0.25s linear;
}

.progress-text {
    color: #fff;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
}

.loading-tips{
    padding-top: 20px;
    border-top: rgba(79, 92, 106, 1) 1px solid;
    text-align: center;
    width: 80%;
    color: #fff;
    font-size: 1rem;
    font-weight: 400;
    position: absolute;
    left: 50%;
    bottom: min(100px,8vh);
    transform: translateX(-50%);

<body style="background:#000;margin:0;overflow:hidden">
    <div id="app" ref="containerDiv" class="container" v-cloak>
        
        <div id="floating-ball" ref="floating-ball" class="floating-ball" v-show="!openMenu" :style="{ left: ballPosition.x + 'px', top: ballPosition.y + 'px' }"
             @mousedown.prevent="ballStart"
             @touchstart.prevent="ballStart"
        >
            <img src="./run-site/images/favicon.png" style="width: 40px;height: 40px;opacity: 0.75" :style="{ transform: iconRotate ? 'rotate(90deg)' : 'none' }"/>
        </div>
        
        <div id="menu" class="menu" :style="{'pointer-events': openMenu? 'auto' : 'none'}">
            <div v-if="openMenu" class="sidebar-overlay" @click="openMenu = false"></div>
            <div class="sidebar" :class="{'sidebar-open':openMenu}">
                <div class="sidebar-button">
                    <div style="margin:auto 0;">Streaming Quality</div>
                    <div style="display: flex;align-items: center;">
                        <select style="background:#42505b;color: #fff;height: 2rem;width: 4rem;border-radius: 4px;border: none;" v-model="quality" @change="changeQuality(quality)">
                            <option value="HD">HD</option>
                            <option value="SD">SD</option>
                            <option value="LD">LD</option>
                            <option value="ULD">ULD</option>
                        </select>
                    </div>
                </div>
                <div style="width: 100%;border: 1px #3f4c57 solid;margin-left: 1rem"></div>
                <div class="sidebar-button">
                    <div style="margin:auto 0;">Full Screen</div>
                    <label class="switch">
                        <input type="checkbox" v-model="isFullScreen" @change="{}">
                        <span class="slider"></span>
                    </label>
                </div>
                <div style="width: 100%;border: 1px #3f4c57 solid;margin-left: 1rem"></div>
                <div class="sidebar-button">
                    <div style="margin:auto 0;">Page Orientation</div>
                    <div class="sidebar-button-btn" @click="isRotateScreen=!isRotateScreen">↻</div>
                </div>
                <div style="width: 100%;border: 1px #3f4c57 solid;margin-left: 1rem"></div>
                <div class="sidebar-button">
                    <div style="margin:auto 0;">Rotate Game</div>
                    <div class="sidebar-button-btn" @click="rotateScreenDC()">↻</div>
                </div>
                <div style="width: 100%;border: 1px #3f4c57 solid;margin-left: 1rem"></div>
                <div class="sidebar-button">
                    <div style="margin:auto 0;">Restart App</div>
                    <div class="sidebar-button-btn" @click="sendDataChannelMessage('game>restart')">Restart</div>
                </div>
                <div style="width: 100%;border: 1px #3f4c57 solid;margin-left: 1rem"></div>
                <div class="sidebar-button">
                    <div style="margin:auto 0;display: flex;align-items: start;">Local Keyboard</div>
                    <label class="switch">
                        <input type="checkbox" v-model="remoteIME" @change="{changeIME()}">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
        
        <div class="game" ref="gameDiv" id="gameWrapper">
            <div class="video-wrapper" ref="remoteWrapper" id="video-wrapper" :style="{ width: videoWidth + 'px', height: videoHeight + 'px' }">
                <audio class="audio" id="remote-audio" ref="remoteAudio" style="display: none" muted autoplay playsinline></audio>
                <video class="video" id="remote-video" ref="remoteVideo" :class="{rotate:isRotate}" autoplay muted playsinline disablePictureInPicture="true" controlslist='nodownload'></video>
                <canvas id="canvasCoc" :class="{rotate:isRotate}"
                        ref="remoteCanvas"
                        @mousemove.prevent="mousemove"
                        @mousedown.prevent="mousedown"
                        @mousewheel.prevent="mousewheel"
                        @mouseup.prevent="mouseup"
                        @touchstart.prevent="touchstart"
                        @touchmove.prevent="touchmove"
                        @touchend.prevent="touchend"
                        @touchcancel.prevent="touchcancel"></canvas>
            </div>
        </div>
        
        <div id="keyboard" class="keyboard"
             :class="[{'keyboard-no-pointer':!isEditKeyboard}]"
             v-show="currentGameConfig && currentGameConfig.keyBoardDirection === rotation && showKeyboard && !isMobile()"
             :style="{ width: videoHeight + 'px', height: videoWidth + 'px' }">
            <template v-if="currentGameConfig">
                <template v-for="(item, key) in currentGameConfig.keyBoard">
                    <div v-show="(!cursorLock && !item.pointerLockShow) || (cursorLock && item.pointerLockShow) || (!item.pointerLockShow && !item.pointerLockHidden)"
                         :key="key"
                         :class="['keyboard-key',`keyboard-key-${item.size}`,`keyboard-key-${keyToKeyCode(item.key)}`]"
                         :style="keyStyle(item, currentGameConfig.keyBoardDirection)"
                    >
                        <div class="keyboard-key-text"
                             :style="{ transform: keyRotate ? 'rotate(270deg)' : 'none' }"
                             style="width: 100%;height: 100%;"
                             @pointerdown="startDragKey($event, key)"
                             :class="[{ bling: item.bling }]"
                             @animationend="disableKeyBling(key)"
                        >
                            {{ item.str }}
                        </div>
                    </div>
                </template>
            
                <template v-if="currentGameConfig.supportLeftRocker && currentGameConfig.center">
                    <div class="l-rocker"
                         @pointerdown="startDragLeftRocker($event)"
                         :style="translationCenterLocation(currentGameConfig.center, currentGameConfig.keyBoardDirection)"
                    >
                        <div class="l-rocker-key l-rocker-key-small" :class="[`keyboard-key-${keyToKeyCode('w')}`]" style="bottom:85%;left: 50%">
                            <div :style="{ transform: keyRotate ? 'rotate(270deg)' : 'none' }">W</div>
                        </div>
                        <div class="l-rocker-key l-rocker-key-small" :class="[`keyboard-key-${keyToKeyCode('a')}`]" style="bottom:50%;left: 15%">
                            <div :style="{ transform: keyRotate ? 'rotate(270deg)' : 'none' }">A</div>
                        </div>
                        <div class="l-rocker-key l-rocker-key-small" :class="[`keyboard-key-${keyToKeyCode('s')}`]" style="bottom:15%;left: 50%">
                            <div :style="{ transform: keyRotate ? 'rotate(270deg)' : 'none' }">S</div>
                        </div>
                        <div class="l-rocker-key l-rocker-key-small" :class="[`keyboard-key-${keyToKeyCode('d')}`]" style="bottom:50%;left: 85%">
                            <div :style="{ transform: keyRotate ? 'rotate(270deg)' : 'none' }">D</div>
                        </div>
                    </div>
                </template>
</template>
        </div>
        <div id="loading" class="loading" v-if="showLoadingProgress < 100">
            <div class="loader">
                <div class="circle"></div>
                <div class="cloud cloud1"></div>
                <div class="cloud cloud2"></div>
            </div>
            <div class="loading-progress" style="width:70%;max-width:500px;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;margin-top:30px;z-index:3">
                <div class="progress-bar" :style="{width : showLoadingProgress + '%', height: '100%', background: '#fff', transition: 'width 0.3s ease'}"></div>
            </div>
            <p style="color:#fff;margin-top:10px;z-index:3">Initializing session... {{showLoadingProgress}}%</p>
            <p id="step-msg" style="color:#94a3b8;font-size:12px;margin-top:5px;z-index:3;height:16px"></p>
        </div>
        <div class="startGame" v-if="showPlayBtn" style="position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;justify-content:center;align-items:center;z-index:999999">
            <button @click="startGame" class="btn-info">Enter Game</button>
        </div>
    </div>
